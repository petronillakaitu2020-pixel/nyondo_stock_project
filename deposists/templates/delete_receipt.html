{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card p-5 text-center">
        <h3>Delete Deposit Record</h3>
        <p>
            Are you sure you want to delete
            {{ deposit.customer.name }}'s deposit?
        </p>
        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-danger">
                Confirm Delete
            </button>
            <a
                href="{% url 'deposit_list' %}"
                class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
