{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container mt-5">
    <div class="card p-4">
        <h3>Add Deposit Payment</h3>
        <hr>
        <p>
            <strong>Customer:</strong>
            {{ deposit.customer.name }}
        </p>
        <p>
            <strong>Current Balance:</strong>
            UGX {{ deposit.balance }}
        </p>
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy}}
            <button class="btn btn-success w-100">
                Save Payment
            </button>
        </form>
    </div>
</div>
{% endblock %}
