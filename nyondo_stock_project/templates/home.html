<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nyondo Hardware</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Fonts -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        body {

            margin: 0;

            font-family: 'Poppins', sans-serif;

            height: 100vh;

            background: url("https://images.unsplash.com/photo-1586864387789-628af9feed72?auto=format&fit=crop&w=1600&q=80") no-repeat center center/cover;

            position: relative;

        }

        /* Dark overlay */

        .overlay {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0,0,0,0.65);

        }

        /* Center content */

        .content {

            position: relative;

            z-index: 2;

            height: 100vh;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            text-align: center;

            color: white;

            padding: 20px;

        }

        .title {

            font-size: 55px;

            font-weight: 700;

            color: #facc15;

        }

        .subtitle {

            font-size: 20px;

            margin-top: 10px;

            color: #e5e7eb;

        }

        .btn-group {

            margin-top: 30px;

        }

        .btn-custom {

            padding: 12px 28px;

            font-size: 16px;

            border-radius: 12px;

            margin: 10px;

            font-weight: 600;

            transition: 0.3s;

        }

        .btn-login {

            background: #2563eb;

            color: white;

        }

        .btn-login:hover {

            background: #1d4ed8;

            transform: translateY(-3px);

        }

        .btn-register {

            background: #f59e0b;

            color: white;

        }

        .btn-register:hover {

            background: #d97706;

            transform: translateY(-3px);

        }

        .footer-text {

            position: absolute;

            bottom: 20px;

            color: #ccc;

            font-size: 14px;

        }

    </style>

</head>

<body>

<div class="overlay"></div>

<div class="content">

    <h1 class="title">

        NYONDO HARDWARE

    </h1>

    <p class="subtitle">

        Inventory • Sales • Deposits • Reports Management System

    </p>

    <p class="subtitle">

        Manage your hardware business efficiently and professionally

    </p>

    <div class="btn-group">

        <a href="{% url 'login' %}" class="btn btn-custom btn-login">

            Login

        </a>

        <a href="{% url 'register' %}" class="btn btn-custom btn-register">

            Register

        </a>

    </div>

    <div class="footer-text">

        © 2026 Nyondo Hardware Management System

    </div>

</div>

</body>

</html>
