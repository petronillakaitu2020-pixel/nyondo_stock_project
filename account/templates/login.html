{% load crispy_forms_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyondo Hardware | Login</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


       <style>
        /* Base Page Layout */
body {
    margin: 0;
    padding: 0;
    /* min-height lets the page stretch if errors pop up, preventing clipping */
    min-height: 100vh; 
    
    /* Your ultra-clean deep slate/blue gradient background */
    background: linear-gradient(135deg, #f8fafc, #e2e8f0);
    /* Flawless centering across all desktop and mobile devices */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
}

/* Glassmorphism Centered Card */
.login-card {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px); /* Added Safari support support */
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 25px;
    padding: 40px;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.05);
    color: white;
    align-self: center;
}

/* Typography Elements */
.brand-title {
    font-size: 30px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 2px;
}

.brand-subtitle {
    color: #cbd5e1;
    font-size: 0.95rem;
}

/* Django Crispy / Bootstrap Input Customization */
.form-control {
    height: 50px;
    border-radius: 12px;
    border: none;
    background: rgba(255, 255, 255, 0.15);
    color: white !important; /* Forces typed username/password text to be white */
}

/* Fixes the black text bug when clicking into inputs */
.form-control:focus {
    background: rgba(255, 255, 255, 0.2);
    color: white !important;
    box-shadow: none;
    border: 1px solid #3b82f6;
}

/* Keeps placeholders readable but elegant against the glass */
.form-control::placeholder {
    color: #d1d5db;
    opacity: 0.8;
}

/* Label text positioning */
label {
    margin-bottom: 6px;
    font-weight: 500;
    color: #ffffff;
    font-size: 0.95rem;
}

/* Interactive Action Button */
.btn-login {
    height: 50px;
    border: none;
    border-radius: 12px;
    background: #c8d6ec;
    font-weight: 600;
    color: white;
    transition: all 0.3s ease;
}

.btn-login:hover {
    background: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(235, 37, 136, 0.4);
}

/* Footer / Create Account Styling */
.register-link {
    color: #bfdbfe;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s ease;
}
.text-secondary {
    color: #cbd5e1 !important;
}

.register-link:hover {
    color: white;
    text-decoration: underline;
}
 
/* Centered Icon Badge */
.logo-circle {
    width: 70px;
    height: 70px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 15px auto; /* Centers the icon perfectly horizontally */
    font-size: 30px;
    color: #3b82f6;
}

       </style>
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card w-100" style="max-width: 420px; margin: 20px auto;">
    <div class="text-center mb-4">

        <div class="logo-circle mb-3">
            <i class="bi bi-building fs-2 text-primary"></i>
        </div>

        <h1 class="brand-title">
            Nyondo Hardware
        </h1>

        <p class="brand-subtitle">
            Welcome back, please login
        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        {{ form|crispy }}

        <button
            type="submit"
            class="btn btn-primary btn-login w-100 mt-3 d-flex align-items-center justify-content-center gap-2">

            <i class="bi bi-box-arrow-in-right"></i>
            <span>Login</span>
        </button>
    </form>

    <div class="text-center mt-4">

        <span class="text-secondary" style="font-size: 0.9rem;">
            Don’t have an account?
        </span>
         <div class="mt-1">
        <a
            href="{% url 'register' %}"
            class="register-link fw-semibold">
            Create Account
        </a>
         </div>
    </div>
    </div>
</div>

</body>

</html>
