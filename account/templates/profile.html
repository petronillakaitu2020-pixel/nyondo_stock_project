{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-person-circle text-primary"
                           style="font-size: 90px;">
                        </i>

                        <h2 class="mt-3">

                            {{ user.username }}

                        </h2>

                        <span class="badge bg-primary p-2">

                            {{ user.role|title }}

                        </span>

                    </div>

                    <table class="table">

                        <tr>

                            <th>Email</th>

                            <td>

                                {{ user.email }}

                            </td>

                        </tr>

                        <tr>

                            <th>Phone Number</th>

                            <td>

                                {{ user.phone_number }}

                            </td>

                        </tr>

                        <tr>

                            <th>NIN</th>

                            <td>

                                {{ user.nin }}

                            </td>

                        </tr>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
