{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Supplier</h2>

    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Update Supplier
        </button>

        <a href="{% url 'supplier_list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
