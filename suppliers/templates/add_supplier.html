{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container mt-5">

    <div class="card p-4">

        <h3>Add Supplier</h3>

        <hr>

        <form method="POST">

            {% csrf_token %}

            {{ form|crispy }}

            <button class="btn btn-success w-100">

                Save Supplier

            </button>

        </form>

    </div>

</div>

{% endblock %}
